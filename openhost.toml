[app]
name = "tunnel"
version = "0.1.0"
description = "Expose a local web application through your OpenHost instance via Chisel reverse tunnel."
authors = ["Andrew Laack <andrew@laack.co>"]

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/healthz"
public_paths = ["/"]

[resources]
memory_mb = 128
cpu_millicores = 200

[data]
app_data = true
